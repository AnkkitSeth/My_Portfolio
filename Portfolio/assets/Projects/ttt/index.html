<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 id="playerText">Tic Tac Toe</h1>
        <button type="button" id="restartBtn">Restart</button>
        <div id="gameboard">
            <div cellIndex="0" class="cell" id="b1"></div>
            <div cellIndex="1" class="cell" id="b2"></div>
            <div cellIndex="2" class="cell" id="b3"></div>
            <div cellIndex="3" class="cell" id="b4"></div>
            <div cellIndex="4" class="cell" id="b5"></div>
            <div cellIndex="5" class="cell" id="b6"></div>
            <div cellIndex="6" class="cell" id="b7"></div>
            <div cellIndex="7" class="cell" id="b8"></div>
            <div cellIndex="8" class="cell" id="b9"></div>
        </div>
        <h2 id="statusText"></h2>
    </div>
    <script src="script.js"></script>
</body>
</html>
